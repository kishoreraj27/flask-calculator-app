```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
    width:380px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.title{
    text-align:center;
    color:white;
    margin-bottom:15px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    font-size:12px;
    margin-bottom:20px;
}

.display{
    width:100%;
    height:80px;
    border:none;
    border-radius:15px;
    padding:15px;
    text-align:right;
    font-size:28px;
    margin-bottom:20px;
    background:#0f172a;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:15px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#334155;
    color:white;
}

.operator{
    background:#2563eb;
    color:white;
}

.equal{
    background:#22c55e;
    color:white;
}

.clear{
    background:#ef4444;
    color:white;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:12px;
}

.status{
    margin-top:10px;
    text-align:center;
    color:#22c55e;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

    <h2 class="title">☁️ Cloud Calculator</h2>

    <p class="subtitle">
        Flask • Docker • AWS EC2
    </p>

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="sqrtCalc()">√</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="operator" onclick="power()">x²</button>

    </div>

    <div class="status">
        🟢 Docker Container Running
    </div>

    <div class="footer">
        Built by Kishore Raj 🚀
    </div>

</div>

<script>

let display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function sqrtCalc(){
    try{
        display.value = Math.sqrt(eval(display.value));
    }
    catch{
        display.value = "Error";
    }
}

function power(){
    try{
        display.value = Math.pow(eval(display.value),2);
    }
    catch{
        display.value = "Error";
    }
}

</script>

</body>
</html>
```
