<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .subtitle {
            text-align: center;
            color: gray;
            margin-bottom: 25px;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 10px;
            text-align: center;
        }

        .result h2 {
            color: #2d3748;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }

        .badge {
            display: inline-block;
            background: #48bb78;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div style="text-align:center">
        <span class="badge">Docker + Flask</span>
    </div>

    <h1>🧮 Cloud Calculator</h1>

    <p class="subtitle">
        Flask Application running inside Docker Container
    </p>

    <form method="POST">

        <input type="number"
               step="any"
               name="num1"
               placeholder="Enter First Number"
               required>

        <select name="operation">
            <option value="add">Addition (+)</option>
            <option value="subtract">Subtraction (-)</option>
            <option value="multiply">Multiplication (×)</option>
            <option value="divide">Division (÷)</option>
        </select>

        <input type="number"
               step="any"
               name="num2"
               placeholder="Enter Second Number"
               required>

        <button type="submit">
            Calculate
        </button>

    </form>

    {% if result is not none %}
    <div class="result">
        <h2>Result: {{ result }}</h2>
    </div>
    {% endif %}

    <div class="footer">
        Built by Kishore Raj 🚀 | AWS • Docker • DevOps
    </div>

</div>

</body>
</html>
